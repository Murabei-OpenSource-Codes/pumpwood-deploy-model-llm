apiVersion : "apps/v1"
kind: Deployment
metadata:
  name: pumpwood-models-llm-app
spec:
  replicas: {replicas}
  selector:
    matchLabels:
      type: app
      endpoint: pumpwood-models-llm-app
      function: model
  template:
    metadata:
      labels:
        type: app
        endpoint: pumpwood-models-llm-app
        function: model
    spec:
      imagePullSecrets:
        - name: dockercfg
      volumes:
      - name: gcp--storage-key
        secret:
          secretName: gcp--storage-key
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: function
                operator: NotIn
                values:
                - system
      containers:
      - name: pumpwood-llm-model
        image: {repository}/pumpwood-models-llm-app:{version}
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            memory: "{requests_memory}"
            cpu:  "{requests_cpu}"
          limits:
            memory: "{limits_memory}"
            cpu:  "{limits_cpu}"
        volumeMounts:
          - name: gcp--storage-key
            readOnly: true
            mountPath: /etc/secrets
        ports:
        - containerPort: 5000
        readinessProbe:
          httpGet:
            path: /health-check/pumpwood-models-llm-app/
            port: 5000
        env:
        - name: DEBUG
          value: "{debug}"
        - name: WORKERS_TIMEOUT
          value: "{workers_timeout}"
        - name: GRANIAN_WORKERS
          value: "{n_workers}"

        ###################
        # DEFAULT CONFIGS #
        - name: HASH_SALT
          valueFrom:
            secretKeyRef:
              name: general-secrets
              key: hash_salt
        - name: PUMPWOOD_COMMUNICATION__CRYPTO_FERNET_KEY
          valueFrom:
            secretKeyRef:
              name: general-secrets
              key: crypto_fernet_key

        # Database
        - name: DB_USERNAME
          value: {db_username}
        - name: DB_HOST
          value: {db_host}
        - name: DB_PORT
          value: "{db_port}"
        - name: DB_DATABASE
          value: {db_database}
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: pumpwood-model-llm-secrets
              key: db_password

        # RABBITMQ ETL
        - name: RABBITMQ_HOST
          value: "rabbitmq-main"
        - name: RABBITMQ_PASSWORD
          valueFrom:
            secretKeyRef:
              name: rabbitmq-main-secrets
              key: password

        # Microsservice
        - name: MICROSERVICE_PASSWORD
          valueFrom:
              secretKeyRef:
                name: microservice-model-secrets
                key: password

        ###########
        # STORAGE #
        - name: STORAGE_BUCKET_NAME
          valueFrom:
            configMapKeyRef:
              name: storage
              key: bucket_name
        - name: STORAGE_TYPE
          valueFrom:
            configMapKeyRef:
              name: storage
              key: storage_type

        # GCP
        - name: GOOGLE_APPLICATION_CREDENTIALS
          value: "/etc/secrets/key-storage.json"
        # AZURE
        - name: AZURE_STORAGE_CONNECTION_STRING
          valueFrom:
            secretKeyRef:
              name: azure--storage-key
              key: azure_storage_connection_string
        # AWS
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: aws--storage-key
              key: aws_access_key_id
              optional: true
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: aws--storage-key
              key: aws_secret_access_key
              optional: true
---
apiVersion : "v1"
kind: Service
metadata:
  name: pumpwood-models-llm-app
  labels:
    type: app
    endpoint: pumpwood-models-llm-app
    function: model
spec:
  type: ClusterIP
  ports:
    - port: 5000
      targetPort: 5000
  selector:
    type: app
    endpoint: pumpwood-models-llm-app
    function: model
